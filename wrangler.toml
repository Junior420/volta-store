name = "volta-store"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

# Bindings below are used by `wrangler pages dev` for local development.
# For the deployed (dashboard git-connected) Pages project, add the same
# three bindings under Settings → Functions in the Cloudflare dashboard —
# see CLOUDFLARE_DEPLOY.md for exact steps.

[[d1_databases]]
binding = "DB"
database_name = "volta"
database_id = "local"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "volta-uploads"

[[kv_namespaces]]
binding = "SESSIONS"
id = "local"
